<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="/style.css" />
</head>
<body class="fs-120p ff-sans-serif d-flex flex-column min-vh-100">
  <header class="bgc-green">
    <nav class="navbar navbar-expand-sm">
      <div class="container-fluid">
        <a class="navbar-brand" href="/form">
          <h1 class="text-center fw-bold d-inline-block align-middle">
            Form</h1>
        </a>
        <div class="collapse navbar-collapse show" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" title="Form" href="/form#form">Form</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <main class="m-auto p-4">
    <form id="request-form" action="/form" method="POST">
      <div class="mb-3">
        <label for="name" class="form-label">ФИО</label>
        <input type="text" class="form-control" id="name" name="name" required>
      </div>
      <div class="mb-3">
        <label for="phone" class="form-label">Телефон</label>
        <input type="tel" class="form-control" id="phone" name="phone" pattern="^\+7\d{10}$" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">e-mail</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>
      <div class="mb-3">
        <label for="birthday" class="form-label">Дата рождения</label>
        <input type="date" class="form-control" id="birthday" name="birthday" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Пол</label>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="sex" id="male" value="male" required>
          <label class="form-check-label" for="male">Мужской</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="sex" id="female" value="female" required>
          <label class="form-check-label" for="female">Женский</label>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Любимый язык программирования</label>
        <select class="form-select" id="languages" name="languages" multiple required>
          <option value="Pascal">Pascal</option>
          <option value="C">C</option>
          <option value="C++">C++</option>
          <option value="JavaScript">JavaScript</option>
          <option value="PHP">PHP</option>
          <option value="Python">Python</option>
          <option value="Java">Java</option>
          <option value="Haskel">Haskel</option>
          <option value="Clojure">Clojure</option>
          <option value="Prolog">Prolog</option>
          <option value="Scala">Scala</option>
          <option value="Go">Go</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="biography" class="form-label">Биография</label>
        <textarea class="form-control" id="biography" name="biography" rows="3" required></textarea>
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="agree_to_terms" name="agree_to_terms" value="true" required>
        <label class="form-check-label" for="agree_to_terms">С контрактом ознакомлен(а)</label>
      </div>
      <button type="submit" class="btn btn-primary">Сохранить</button>
    </form>
  </main>
  <footer class="bgc-green mt-auto p-3">
    <div class="text-center">
      Copyright &copy; <time datetime="2025">2025</time> Arkady DiSkills
    </div>
  </footer>
</body>
</html>
